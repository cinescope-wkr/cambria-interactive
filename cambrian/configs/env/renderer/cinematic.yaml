defaults:
  - renderer
  - /MjCambrianCinematicRendererConfig

save_mode: WEBP
default_overlay_mode: "minimal"

# Default cinematic camera mood: agent-centric, shallow-like composition.
camera:
  azimuth: -20.0
  elevation: -8.0
  distance: 0.18
  trackbodyid: 1
  type: 1 # mjCAMERA_TRACKING

cinematic:
  enabled: true
  camera_preset: agent_fp_shallow_dof
  overlay_mode: minimal
  optical_genome_constraints:
    abbe_number_range: [20.0, 65.0]
    focus_distance_range: [0.25, 12.0]
    lens_thickness_max: 0.05
    curvature_profile_abs_max: [0.12, 0.06, 0.02]
  sensor:
    enabled: true
    sensor:
      enabled: true
      photon_full_well: 6000.0
      read_noise_std: 3.0
      dark_current: 2.0
      fixed_pattern_std: 0.01
      analog_gain: 1.0
