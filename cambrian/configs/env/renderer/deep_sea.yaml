defaults:
  - renderer

theme: deep_sea
default_overlay_mode: "off"

camera:
  azimuth: 162.0
  elevation: -16.0
  distance: 6.75
  lookat: [0.0, 0.0, 0.55]
  trackbodyid: 1
  type: 1 # mjCAMERA_TRACKING

scene:
  flags:
    - 0 # mjRND_SHADOW
    - 0 # mjRND_WIREFRAME
    - 0 # mjRND_REFLECTION
    - 0 # mjRND_ADDITIVE
    - 0 # mjRND_SKYBOX
    - 1 # mjRND_FOG
    - 1 # mjRND_HAZE
    - 0 # mjRND_SEGMENT
    - 0 # mjRND_IDCOLOR
    - 1 # mjRND_CULL_FACE

scene_xml_overrides:
  - mujoco:
      - visual:
          - map:
              - fogstart: "0.4"
              - fogend: "8.5"
          - rgba:
              - haze: "0.04 0.24 0.30 1"
              - camera: "0.98 0.90 0.24 1"
      - worldbody:
          - light:
              - name: "deep_sea_fill"
              - pos: "0 0 3.5"
              - dir: "0 0 -1"
              - directional: "true"
              - diffuse: "0.20 0.32 0.40"
              - ambient: "0.10 0.14 0.18"
              - specular: "0.02 0.04 0.05"
              - castshadow: "false"
          - light:
              - name: "deep_sea_rim"
              - pos: "-2.0 1.6 1.4"
              - dir: "0.55 -0.18 -0.9"
              - directional: "true"
              - diffuse: "0.16 0.26 0.30"
              - ambient: "0.0 0.0 0.0"
              - specular: "0.04 0.06 0.07"
              - castshadow: "false"
          - light:
              - name: "deep_sea_bloom"
              - pos: "2.5 -1.0 0.8"
              - dir: "-0.6 0.2 -0.3"
              - directional: "true"
              - diffuse: "0.08 0.16 0.12"
              - ambient: "0.0 0.0 0.0"
              - specular: "0.0 0.0 0.0"
              - castshadow: "false"
